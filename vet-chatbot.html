<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PataVida — Assistente Virtual</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --sage:       #4a7c59;
  --sage-light: #e8f0e9;
  --sage-mid:   #6fa07f;
  --sage-dark:  #2e5c3a;
  --cream:      #faf7f2;
  --cream-dark: #f0ebe0;
  --warm-light: #fdf0e4;
  --warm:       #c8773b;
  --text:       #1e2d24;
  --text-mid:   #4a5e50;
  --text-muted: #8a9e90;
  --border:     rgba(74,124,89,0.18);
  --r: 18px; --rsm: 10px;
}
body {
  font-family: 'DM Sans', sans-serif;
  background: var(--cream); min-height: 100vh;
  display: flex; align-items: center; justify-content: center;
  padding: 1rem; color: var(--text); font-size: 15px;
}
.shell {
  width: 100%; max-width: 780px; height: 92vh; max-height: 840px;
  display: flex; flex-direction: column; background: #fff;
  border-radius: 28px; border: 1px solid var(--border); overflow: hidden;
  box-shadow: 0 8px 48px rgba(30,45,36,0.10);
}
.header {
  display: flex; align-items: center; gap: 14px;
  padding: 16px 22px; background: var(--sage-dark);
  color: #fff; flex-shrink: 0;
}
.logo {
  width: 44px; height: 44px; border-radius: 50%;
  background: rgba(255,255,255,0.15);
  display: flex; align-items: center; justify-content: center;
  font-size: 22px; flex-shrink: 0;
}
.header-text { flex: 1; }
.header-title { font-family: 'DM Serif Display', serif; font-size: 1.15rem; font-weight: 400; }
.header-sub   { font-size: 0.75rem; opacity: 0.68; margin-top: 2px; }
.status-pill {
  display: flex; align-items: center; gap: 6px;
  background: rgba(255,255,255,0.12); padding: 4px 11px;
  border-radius: 30px; font-size: 0.72rem; font-weight: 500;
}
.dot {
  width: 7px; height: 7px; border-radius: 50%;
  background: #6ee7a0; animation: pulse 2s infinite;
}
@keyframes pulse {
  0%,100% { box-shadow: 0 0 0 0 rgba(110,231,160,0.4); }
  50%      { box-shadow: 0 0 0 5px rgba(110,231,160,0); }
}
.api-bar {
  display: flex; align-items: center; gap: 8px;
  padding: 9px 22px; background: var(--cream-dark);
  border-bottom: 1px solid var(--border); flex-shrink: 0;
}
.api-bar label {
  font-size: 0.72rem; font-weight: 600; color: var(--text-muted);
  text-transform: uppercase; letter-spacing: 0.06em; white-space: nowrap;
}
.api-bar input {
  flex: 1; padding: 7px 11px; border-radius: var(--rsm);
  border: 1px solid var(--border); background: #fff;
  font-family: monospace; font-size: 0.78rem; color: var(--text);
  outline: none; transition: border-color .2s;
}
.api-bar input:focus { border-color: var(--sage-mid); }
.api-bar input::placeholder { color: var(--text-muted); font-family: 'DM Sans', sans-serif; }
.api-link { font-size: 0.71rem; color: var(--sage); text-decoration: none; white-space: nowrap; }
.api-link:hover { text-decoration: underline; }
.messages {
  flex: 1; overflow-y: auto; padding: 20px 22px;
  display: flex; flex-direction: column; gap: 12px; scroll-behavior: smooth;
}
.messages::-webkit-scrollbar { width: 4px; }
.messages::-webkit-scrollbar-thumb { background: rgba(74,124,89,0.2); border-radius: 10px; }
.row { display: flex; gap: 9px; align-items: flex-end; animation: up .25s ease both; }
@keyframes up { from { opacity:0; transform:translateY(6px); } to { opacity:1; transform:translateY(0); } }
.row.user { flex-direction: row-reverse; }
.av {
  width: 30px; height: 30px; border-radius: 50%; flex-shrink: 0;
  display: flex; align-items: center; justify-content: center; font-size: 14px;
}
.av.bot  { background: var(--sage-light); }
.av.user { background: var(--warm-light); font-size: 0.7rem; font-weight: 600; color: var(--warm); }
.col { display: flex; flex-direction: column; gap: 3px; max-width: 73%; }
.row.user .col { align-items: flex-end; }
.bubble {
  padding: 10px 14px; border-radius: 17px;
  line-height: 1.65; font-size: 0.9rem; word-break: break-word;
}
.bubble.bot  { background: var(--sage-light); color: var(--text); border-bottom-left-radius: 4px; }
.bubble.user { background: var(--sage-dark); color: #fff; border-bottom-right-radius: 4px; }
.bubble p + p { margin-top: 5px; }
.bubble strong { font-weight: 600; }
.bubble ul { padding-left: 17px; margin-top: 4px; }
.bubble li { margin-top: 2px; }
.ts { font-size: 0.65rem; color: var(--text-muted); padding: 0 2px; }
.chips { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 8px; }
.chip {
  padding: 6px 13px; border-radius: 30px;
  border: 1px solid var(--border); background: var(--cream);
  color: var(--text-mid); font-family: 'DM Sans', sans-serif;
  font-size: 0.78rem; cursor: pointer; transition: all .15s; white-space: nowrap;
}
.chip:hover { background: var(--sage-light); border-color: var(--sage-mid); color: var(--sage-dark); }
.typing {
  display: flex; gap: 5px; padding: 12px 15px;
  border-radius: 17px; border-bottom-left-radius: 4px;
  background: var(--sage-light); width: fit-content;
}
.typing span {
  width: 7px; height: 7px; border-radius: 50%;
  background: var(--sage-mid); animation: b 1.1s infinite ease-in-out;
}
.typing span:nth-child(2) { animation-delay:.16s; }
.typing span:nth-child(3) { animation-delay:.32s; }
@keyframes b { 0%,60%,100% { transform:translateY(0); } 30% { transform:translateY(-6px); } }
.input-bar {
  display: flex; align-items: flex-end; gap: 9px;
  padding: 11px 18px 15px; background: #fff;
  border-top: 1px solid var(--border); flex-shrink: 0;
}
.input-bar textarea {
  flex: 1; resize: none; border: 1px solid var(--border);
  border-radius: var(--r); padding: 10px 14px;
  font-family: 'DM Sans', sans-serif; font-size: 0.9rem;
  color: var(--text); background: var(--cream); outline: none;
  max-height: 110px; line-height: 1.5; transition: border-color .2s;
}
.input-bar textarea:focus { border-color: var(--sage-mid); background: #fff; }
.input-bar textarea::placeholder { color: var(--text-muted); }
.send-btn {
  width: 42px; height: 42px; border-radius: 50%; border: none;
  background: var(--sage-dark); color: #fff; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: background .15s, transform .1s; flex-shrink: 0;
}
.send-btn:hover  { background: var(--sage); }
.send-btn:active { transform: scale(0.93); }
.send-btn:disabled { background: var(--text-muted); cursor: default; }
.send-btn svg { width: 18px; height: 18px; }
.toast {
  position: fixed; bottom: 20px; left: 50%;
  transform: translateX(-50%) translateY(70px);
  background: #7b2424; color: #fff; padding: 9px 18px;
  border-radius: 30px; font-size: 0.81rem; font-weight: 500;
  transition: transform .28s ease; z-index: 999;
  max-width: 90vw; text-align: center; pointer-events: none;
}
.toast.show { transform: translateX(-50%) translateY(0); }
.footer {
  text-align: center; font-size: 0.67rem; color: var(--text-muted);
  padding: 5px 0 8px; background: #fff; flex-shrink: 0;
}
@media (max-width: 520px) {
  .shell { border-radius: 0; height: 100vh; max-height: none; }
  body   { padding: 0; }
  .col   { max-width: 85%; }
  .api-link { display: none; }
}
</style>
</head>
<body>

<div class="shell">
  <header class="header">
    <div class="logo">🐾</div>
    <div class="header-text">
      <div class="header-title">PataVida — Assistente Virtual</div>
      <div class="header-sub">Clínica Veterinária &middot; Emergências 24h</div>
    </div>
    <div class="status-pill"><div class="dot"></div>Online</div>
  </header>

  <div class="api-bar">
    <label>🔑 Gemini Key</label>
    <input type="password" id="apiKey" placeholder="Cole sua API Key do Google AI Studio..." autocomplete="off">
    <a class="api-link" href="https://aistudio.google.com/apikey" target="_blank">Obter chave ↗</a>
  </div>

  <div class="messages" id="messages"></div>

  <div class="input-bar">
    <textarea id="txt" rows="1" placeholder="Digite sua mensagem… (Enter envia)" maxlength="800"></textarea>
    <button class="send-btn" id="sendBtn">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round">
        <line x1="22" y1="2" x2="11" y2="13"/>
        <polygon points="22 2 15 22 11 13 2 9 22 2"/>
      </svg>
    </button>
  </div>
  <div class="footer">Powered by Gemini 2.0 Flash &nbsp;·&nbsp; PataVida Clínica Veterinária</div>
</div>

<div class="toast" id="toast"></div>

<script>
var API_URL = 'https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent';

var SYS = 'Você é o assistente virtual da PataVida Clínica Veterinária, localizada em São Paulo/SP.\n\nINFORMAÇÕES:\n- Endereço: Rua das Flores, 452 — Pinheiros, SP\n- Telefone / WhatsApp: (11) 4002-8922\n- Horário: Seg–Sex 8h–20h | Sáb 8h–17h | Emergência 24h\n\nSERVIÇOS: Consultas clínicas, vacinação, vermifugação, banho e tosa, cirurgias, exames laboratoriais, raio-x, ultrassom, internação, UTI, microchipagem, odontologia, castração.\n\nPREÇOS APROXIMADOS:\n- Consulta: R$ 120–180\n- Castração gato: a partir de R$ 350\n- Castração cadela pequena: a partir de R$ 480\n- Banho porte pequeno: a partir de R$ 45\n- Vacina V10: R$ 85 | Antirrábica: R$ 55\n(Confirmar por telefone)\n\nREGRAS:\n- Seja empático, carinhoso e profissional\n- Em urgências: oriente ligar para (11) 4002-8922 imediatamente\n- Nunca substitua orientação médica presencial\n- Para agendamento pergunte: nome do tutor, pet, espécie, data preferida e motivo\n- Respostas curtas, máx. 3 parágrafos\n- Responda sempre em português brasileiro';

var FAQ = [
  '📅 Quero agendar uma consulta',
  '🕐 Qual o horário de funcionamento?',
  '💰 Quanto custa uma consulta?',
  '💉 Quais vacinas meu pet precisa?',
  '✂️ Vocês fazem castração?',
  '🚨 Meu pet está mal — o que fazer?',
  '🛁 Fazem banho e tosa?',
  '🔬 Fazem exames laboratoriais?',
  '📍 Onde fica a clínica?',
  '🐱 Atendem gatos também?'
];

// ATENÇÃO: renomeado para chatHistory para não conflitar com window.history do browser
var chatHistory = [];
var loading = false;

var msgEl   = document.getElementById('messages');
var txtEl   = document.getElementById('txt');
var btnEl   = document.getElementById('sendBtn');
var toastEl = document.getElementById('toast');
var keyEl   = document.getElementById('apiKey');

function getTime() {
  return new Date().toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' });
}

function showToast(msg) {
  toastEl.textContent = msg;
  toastEl.classList.add('show');
  setTimeout(function() { toastEl.classList.remove('show'); }, 4500);
}

function scrollBottom() {
  msgEl.scrollTop = msgEl.scrollHeight;
}

function fmt(raw) {
  var t = raw
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
    .replace(/\*(.*?)\*/g, '<em>$1</em>');
  var lines = t.split('\n');
  var html = '', list = false;
  for (var i = 0; i < lines.length; i++) {
    var l = lines[i].trim();
    if (/^[-•]\s/.test(l)) {
      if (!list) { html += '<ul>'; list = true; }
      html += '<li>' + l.replace(/^[-•]\s/, '') + '</li>';
    } else {
      if (list) { html += '</ul>'; list = false; }
      if (l) html += '<p>' + l + '</p>';
    }
  }
  if (list) html += '</ul>';
  return html;
}

function appendMsg(role, text, withChips) {
  var row = document.createElement('div');
  row.className = 'row ' + role;

  var av = document.createElement('div');
  av.className = 'av ' + role;
  av.textContent = role === 'bot' ? '🐾' : 'EU';

  var col = document.createElement('div');
  col.className = 'col';

  var bub = document.createElement('div');
  bub.className = 'bubble ' + role;
  bub.innerHTML = fmt(text);

  var ts = document.createElement('div');
  ts.className = 'ts';
  ts.textContent = getTime();

  col.appendChild(bub);
  col.appendChild(ts);

  if (role === 'bot' && withChips) {
    var wrap = document.createElement('div');
    wrap.className = 'chips';
    for (var i = 0; i < FAQ.length; i++) {
      (function(q) {
        var c = document.createElement('button');
        c.className = 'chip';
        c.textContent = q;
        c.onclick = function() { wrap.remove(); quickSend(q); };
        wrap.appendChild(c);
      })(FAQ[i]);
    }
    col.appendChild(wrap);
  }

  row.appendChild(av);
  row.appendChild(col);
  msgEl.appendChild(row);
  scrollBottom();
}

function showTyping() {
  var row = document.createElement('div');
  row.className = 'row bot';
  row.id = 'typRow';
  var av = document.createElement('div');
  av.className = 'av bot';
  av.textContent = '🐾';
  var t = document.createElement('div');
  t.className = 'typing';
  t.innerHTML = '<span></span><span></span><span></span>';
  row.appendChild(av);
  row.appendChild(t);
  msgEl.appendChild(row);
  scrollBottom();
}

function hideTyping() {
  var t = document.getElementById('typRow');
  if (t) t.remove();
}

function handleSend() {
  var text = txtEl.value.trim();
  if (!text || loading) return;

  var key = keyEl.value.trim();
  if (!key) {
    showToast('⚠️ Insira sua Gemini API Key antes de enviar.');
    keyEl.focus();
    return;
  }

  txtEl.value = '';
  txtEl.style.height = 'auto';
  loading = true;
  btnEl.disabled = true;

  appendMsg('user', text, false);

  chatHistory.push({ role: 'user', parts: [{ text: text }] });

  showTyping();

  var contents = [
    { role: 'user',  parts: [{ text: SYS }] },
    { role: 'model', parts: [{ text: 'Entendido! Estou pronto para atender. 🐾' }] }
  ].concat(chatHistory);

  fetch(API_URL + '?key=' + encodeURIComponent(key), {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      contents: contents,
      generationConfig: { temperature: 0.75, maxOutputTokens: 600 }
    })
  })
  .then(function(res) {
    return res.json().then(function(data) {
      return { ok: res.ok, status: res.status, data: data };
    });
  })
  .then(function(r) {
    hideTyping();
    if (!r.ok) {
      var errMsg = (r.data && r.data.error && r.data.error.message) || ('Erro ' + r.status);
      throw new Error(errMsg);
    }
    var reply = r.data
      && r.data.candidates
      && r.data.candidates[0]
      && r.data.candidates[0].content
      && r.data.candidates[0].content.parts
      && r.data.candidates[0].content.parts[0]
      && r.data.candidates[0].content.parts[0].text;

    if (!reply) throw new Error('Resposta vazia da API.');

    appendMsg('bot', reply, false);
    chatHistory.push({ role: 'model', parts: [{ text: reply }] });
    if (chatHistory.length > 24) chatHistory = chatHistory.slice(-24);

    loading = false;
    btnEl.disabled = false;
    txtEl.focus();
  })
  .catch(function(err) {
    hideTyping();
    appendMsg('bot', '😔 Não consegui responder agora. Verifique sua API Key ou ligue: (11) 4002-8922.', false);
    showToast('Erro: ' + (err.message || String(err)));
    console.error('[PataVida]', err);
    loading = false;
    btnEl.disabled = false;
    txtEl.focus();
  });
}

function quickSend(text) {
  txtEl.value = text;
  handleSend();
}

btnEl.addEventListener('click', handleSend);

txtEl.addEventListener('input', function() {
  txtEl.style.height = 'auto';
  txtEl.style.height = Math.min(txtEl.scrollHeight, 110) + 'px';
});

txtEl.addEventListener('keydown', function(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    handleSend();
  }
});

setTimeout(function() {
  appendMsg(
    'bot',
    'Olá! Seja bem-vindo à **PataVida Clínica Veterinária** 🐾\n\nSou seu assistente virtual e estou aqui para ajudar com agendamentos, dúvidas sobre a saúde do seu pet e informações sobre nossos serviços.\n\nEscolha uma pergunta abaixo ou digite livremente!',
    true
  );
}, 400);
</script>
</body>
</html>
