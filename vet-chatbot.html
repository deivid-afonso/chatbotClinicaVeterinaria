<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PataVida — Assistente</title>

<style>
body{font-family:Arial;background:#faf7f2;margin:0}
.shell{max-width:780px;margin:20px auto;background:#fff;border-radius:16px;display:flex;flex-direction:column;height:92vh;box-shadow:0 10px 40px rgba(0,0,0,0.08)}
.header{background:#2e5c3a;color:#fff;padding:16px;font-weight:bold}
.messages{flex:1;overflow:auto;padding:15px;display:flex;flex-direction:column;gap:8px}
.bubble{padding:10px 14px;border-radius:14px;max-width:75%}
.user{background:#2e5c3a;color:#fff;margin-left:auto}
.bot{background:#e8f0e9}
.input{display:flex;padding:10px;border-top:1px solid #ddd;gap:8px}
textarea{flex:1;padding:10px;border-radius:10px;border:1px solid #ccc}
button{padding:10px;border:none;border-radius:10px;background:#2e5c3a;color:#fff}
.typing{font-size:12px;color:#888}
</style>
</head>

<body>

<div class="shell">
  <div class="header">🐾 PataVida Assistente</div>
  <div class="messages" id="messages"></div>

  <div class="input">
    <textarea id="txt"></textarea>
    <button onclick="handleSend()">Enviar</button>
  </div>
</div>

<script>

var API_URL = 'https://ufl2nnt31m.execute-api.us-east-1.amazonaws.com/prod/chat';

var SYS = `Você é um assistente veterinário simpático e direto.`;

var chatHistory = [];
var loading = false;

function append(role, text){
  var div = document.createElement('div');
  div.className = 'bubble ' + role;
  div.innerText = text;
  document.getElementById('messages').appendChild(div);
}

function showTyping(){
  var div = document.createElement('div');
  div.id = 'typing';
  div.className = 'typing';
  div.innerText = 'Digitando...';
  document.getElementById('messages').appendChild(div);
}

function hideTyping(){
  var el = document.getElementById('typing');
  if(el) el.remove();
}

async function handleSend(){
  if(loading) return;

  var txt = document.getElementById('txt');
  var text = txt.value.trim();
  if(!text) return;

  append('user', text);
  txt.value='';

  chatHistory.push({ role:'user', content:text });

  showTyping();

  try{
    const res = await fetch(API_URL, {
      method:'POST',
      headers:{ 'Content-Type':'application/json' },
      body: JSON.stringify({
        messages:[
          { role:'system', content: SYS },
          ...chatHistory
        ]
      })
    });

    const data = await res.json();
    hideTyping();

    var reply = data?.choices?.[0]?.message?.content;

    append('bot', reply);

    chatHistory.push({ role:'assistant', content: reply });

  }catch(e){
    hideTyping();
    append('bot', 'Erro ao responder');
    console.error(e);
  }
}

</script>
</body>
</html>
